<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCommand Center</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>OpenCommand Center</h1>
      <div class="controls">
        <select id="agent-select"><option value="">Select agent...</option></select>
        <input type="text" id="skill-input" placeholder="Skill (e.g., openclaw)" value="openclaw">
        <button id="send-btn">Send</button>
      </div>
    </header>

    <main id="log"></main>

    <footer>
      <textarea id="prompt-input" placeholder="Enter task payload as JSON..."></textarea>
    </footer>
  </div>

  <script src="frontend.js"></script>
</body>
</html>
