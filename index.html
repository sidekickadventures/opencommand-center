<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Xaeon Cloud • OpenClaw</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="monitor-frame">
 <div class="screen">
 <div class="header">OPENCLAW • AGENT COMMAND CENTER</div>
 
 <div class="container" id="agents"></div>
 
 <div class="log" id="log">
 <strong>● System Online</strong> — Connected to Xaeon Cloud.<br>
 Select an agent, then type a command below.
 </div>

 <div class="input-area">
   <div class="input-row">
     <textarea id="payload-input" placeholder="Type a command in plain English...&#10;E.g. &quot;verify resources&quot; or &quot;compose a trap beat at 140 bpm&quot;"></textarea>
     <button id="mode-toggle" onclick="toggleMode()" title="Toggle between Natural Language and JSON mode">{ }</button>
   </div>
   <div class="mode-hint" id="mode-hint">Natural Language mode — just type what you want</div>
 </div>
 </div>
</div>

<script src="frontend.js"></script>
<script>
function toggleMode() { if (typeof window.toggleMode === 'function') window.toggleMode(); }
</script>
</body>
</html>
